openapi: 3.1.0
info:
  title: MyMuse Demo API
  version: 0.1.0
  description: Minimal OpenAPI skeleton for the self-hosted MyMuse demo server.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
  /ready:
    get:
      summary: Readiness probe
      responses:
        "200":
          description: Storage and API are ready
        "503":
          description: Storage is not ready yet
  /auth/register-owner:
    post:
      summary: Register the first owner account
      responses:
        "201":
          description: Owner created
  /auth/login:
    post:
      summary: Login with email and password
      responses:
        "200":
          description: Login successful
        "401":
          description: Invalid credentials
  /api/tracks:
    get:
      summary: List library tracks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Track list
  /api/tracks/upload:
    post:
      summary: Upload a track into local storage
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Track created
  /api/playlists:
    get:
      summary: List playlists
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Playlist list
    post:
      summary: Create a playlist
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Playlist created
  /api/shares:
    get:
      summary: List active shares
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Share list
    post:
      summary: Create a public share link
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Share created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
