services:
  postgres:
    image: postgres:16-alpine
    container_name: mymuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mymuse
      POSTGRES_PASSWORD: mymuse
      POSTGRES_DB: mymuse
    ports:
      - "5432:5432"
    volumes:
      - mymuse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mymuse -d mymuse"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mymuse_pgdata:
